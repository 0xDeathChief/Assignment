<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Design</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <nav>
            <div>
                <img src="./assets/logo.png" alt="Logo">
            </div>

            <ul>
                <li><a href="#Speakers">Speakers</a></li>
                <li><a href="#Schedule">Schedule</a></li>
                <li><a href="#Tracks">Tracks</a></li>
                <li><a href="#Venue">Venue</a></li>
                <li><a href="#Blog">Blog</a></li>
            </ul>

            <button class="navbar-button">Register Now</button>
        </nav>
    </header>
    <main>
        <section class="banner">
            <div class="banner-img">
                <h1>Code. <em>Connect.</em> Create</h1>
                <p>Join 4,000+ engineers, founders, and builders at the premier developer<br>conference of 2026. Three
                    days of cutting-edge talks, hands-on workshops,<br>and meaningful connections.</p>
            </div>
            <button class="banner-button">Register Now</button>
        </section>

        <section class="speakers">
            <h1>Meet the Speakers</h1>
            <div class="card">
                
            </div>
        </section>
    </main>
</body>

</html>
